name: Commercial Build

# RustDesk Pro Server Commercial Edition Build Workflow
# 职责：编译 + 打包 + GitHub Release

permissions:
  contents: write
  packages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g., pro-v1.0.0)'
        required: false
        type: string
      platforms:
        description: '构建平台 (逗号分隔: amd64,arm64v8,armv7,windows)'
        required: false
        type: string
        default: 'amd64,arm64v8,armv7,windows'
  push:
    branches: [main]
    tags:
      - 'pro-v[0-9]+.[0-9]+.[0-9]+'
      - 'pro-[0-9]+.[0-9]+.[0-9]+'
      - 'pro-v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - 'pro-[0-9]+.[0-9]+.[0-9]+-[0-9]+'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Binary build for Linux platforms
  build:
    name: Build - ${{ matrix.job.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64",   target: "x86_64-unknown-linux-musl" }
          - { name: "arm64v8", target: "aarch64-unknown-linux-musl" }
          - { name: "armv7",   target: "armv7-unknown-linux-musleabihf" }

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: ${{ matrix.job.target }}

      - name: Install cross tool
        run: cargo install cross --git https://github.com/rust-embedded/cross

      - name: Install OpenSSL for musl targets
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.job.target }}

      - name: Build
        run: |
          rm -f commercial/Cargo.lock
          cross build --manifest-path commercial/Cargo.toml --release --target=${{ matrix.job.target }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          OPENSSL_DIR: /usr
          OPENSSL_STATIC: 1

      - name: Exec chmod
        run: chmod -v a+x commercial/target/${{ matrix.job.target }}/release/*

      - name: Publish Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: |
            commercial/target/${{ matrix.job.target }}/release/rustdesk-pro
          if-no-files-found: error

  # Windows build
  build-win:
    name: Build - windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --manifest-path commercial/Cargo.toml --release --target=x86_64-pc-windows-msvc
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Publish Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries-windows-x86_64
          path: |
            commercial\target\x86_64-pc-windows-msvc\release\rustdesk-pro.exe
          if-no-files-found: error

  # Debian package build
  deb-package:
    name: debian package - ${{ matrix.job.name }}
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64",   debian_platform: "amd64",   crossbuild_package: "" }
          - { name: "arm64v8", debian_platform: "arm64",   crossbuild_package: "crossbuild-essential-arm64" }
          - { name: "armv7",   debian_platform: "armhf",   crossbuild_package: "crossbuild-essential-armhf" }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: binaries

      - name: Make binaries executable
        run: chmod -v a+x binaries/*

      - name: Install dependencies
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -y debhelper fakeroot ${{ matrix.job.crossbuild_package }}

      - name: Get git tag
        id: vars
        run: |
          T=${GITHUB_REF#refs/*/}
          echo "GIT_TAG=$T" >> $GITHUB_ENV
          VERSION=${T#pro-v}
          VERSION=${VERSION#pro-}
          echo "DEB_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build debian package
        run: |
          mkdir -p debian-package
          cp binaries/* debian-package/
          
          mkdir -p debian-package/DEBIAN
          cat > debian-package/DEBIAN/control << EOF
          Package: rustdesk-pro-server
          Version: ${{ env.DEB_VERSION }}
          Section: net
          Priority: optional
          Architecture: ${{ matrix.job.debian_platform }}
          Maintainer: RustDesk Team <info@rustdesk.com>
          Description: RustDesk Pro Server - Enterprise Remote Control Solution
           RustDesk Pro Server is the commercial edition of RustDesk Server,
           providing enterprise-grade features including license management,
           user management, device management, and audit logging.
          EOF
          
          fakeroot dpkg-deb --build debian-package rustdesk-pro-server-${{ env.GIT_TAG }}-${{ matrix.job.name }}.deb

      - name: Publish Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: debian-package-${{ matrix.job.name }}
          path: rustdesk-pro-server-${{ env.GIT_TAG }}-${{ matrix.job.name }}.deb
          if-no-files-found: error

  # Unified GitHub release with all binaries and debian packages
  release:
    name: Github release
    needs: 
      - build
      - build-win
      - deb-package
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Install zip
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -y zip

      - name: Pack Linux binaries
        run: |
          for arch in amd64 arm64v8 armv7; do
            mkdir -p release
            cp artifacts/binaries-linux-$arch/rustdesk-pro release/rustdesk-pro-$arch
            chmod +x release/rustdesk-pro-$arch
            zip release/rustdesk-pro-server-linux-$arch.zip release/rustdesk-pro-$arch
          done

      - name: Pack Windows binaries
        run: |
          cp artifacts/binaries-windows-x86_64/rustdesk-pro.exe release/
          zip release/rustdesk-pro-server-windows-x86_64.zip release/rustdesk-pro.exe

      - name: Copy debian packages
        run: |
          cp artifacts/debian-package-*/rustdesk-pro-server-*.deb release/ 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/*.zip
            release/*.deb
