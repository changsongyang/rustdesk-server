name: Security

# RustDesk Pro Server - 安全扫描工作流
# 职责：依赖漏洞扫描、代码安全分析、容器镜像扫描
# 触发时机：每周定时运行、push 到 main 分支、手动触发

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日凌晨运行
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  # Cargo 依赖漏洞扫描
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0040 --ignore RUSTSEC-2021-0139 --ignore RUSTSEC-2024-0375 --ignore RUSTSEC-2023-0051 --ignore RUSTSEC-2021-0137 --ignore RUSTSEC-2023-0040 --ignore RUSTSEC-2021-0145 --ignore RUSTSEC-2023-0059
        working-directory: commercial

  # Trivy 文件系统漏洞扫描
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './commercial'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Display vulnerabilities
        run: |
          if command -v jq &> /dev/null; then
            cat trivy-results.sarif | jq -r '.runs[0].results[] | "\(.rule.id): \(.message.text)"'
          else
            echo "jq not installed, skipping detailed output"
          fi

  # CodeQL 代码安全分析
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
      
      - name: Build project for CodeQL
        run: cargo build --manifest-path commercial/Cargo.toml --release
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  # Secret 扫描
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
          redact: true

  # 安全检查汇总
  security-summary:
    name: Security Summary
    needs: [cargo-audit, trivy-scan, codeql, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Report security status
        run: |
          echo "🔒 All security checks completed!"
          echo "📊 Security Summary:"
          echo "- Cargo Audit: COMPLETED"
          echo "- Trivy Vulnerability Scan: COMPLETED"
          echo "- CodeQL Analysis: COMPLETED"
          echo "- Secret Detection: COMPLETED"
